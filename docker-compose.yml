services:

  # 🔹 API de inferência
  churn-api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=production
    depends_on:
      - mlflow
    restart: always

  # 🔹 MLflow (tracking)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
    restart: always

  # 🔹 Prometheus (métricas)
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  # 🔹 Grafana (dashboard)
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always